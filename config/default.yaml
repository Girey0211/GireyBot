# config/default.yaml — 모든 서버에 공통 적용되는 기본값 (동작 설정)
# 민감 정보(토큰, API 키) 및 LLM 설정은 프로젝트 루트의 secrets.yaml에 정의합니다.

skills:
  enabled: []                     # 빈 리스트 = 전체 활성화
  disabled: []                    # 명시적 비활성화 목록
  entries: {}                     # 개별 스킬 오버라이드 (OpenClaw 호환)

auto_detect:
  enabled: true
  channels: []                    # 빈 리스트 = 전체 채널 감시
  keywords: []                    # 추가 감지 키워드 (봇 이름은 기본 포함)

mcp_servers: []                   # 사용 가능한 MCP 서버 목록

# ─── 메모리 설정 ──────────────────────────────────────────────
memory:
  db_path: "data/memory.db"         # SQLite DB 경로
  persona_path: "data/persona.md"   # 봇 페르소나 파일 경로
  max_history: 3                    # 컨텍스트에 포함할 최근 대화 수
  max_messages: 10                  # 컨텍스트에 포함할 최근 채널 메시지 수
  max_facts: 5                      # 컨텍스트에 포함할 최대 팩트 수
  max_summaries: 2                  # 컨텍스트에 포함할 최대 요약 수
  max_events: 3                     # 컨텍스트에 포함할 최대 중요 이벤트 수
  auto_extract_facts: false         # 대화에서 자동으로 사실 추출 여부 (4B 모델: false 권장)
  retention_days: 7                 # 대화 기록 보존 기한 (일)
  cleanup_interval_hours: 24        # 자동 정리 주기 (시간)

# ─── 응답 설정 ────────────────────────────────────────────────
response:
  language: "auto"                # 응답 언어 (auto = 요청 언어 따라감)
  max_length: 2000                # Discord 메시지 길이 제한
  use_embed: true                 # Embed 형식 사용 여부

# ─── 유저 피드백 설정 ──────────────────────────────────────────
feedback:
  enabled: true                   # 피드백 기능 활성화 여부
  # 위반 유형별 점수 (값이 클수록 심각)
  scores:
    obscene: 30                   # 음란·성적 내용
    political: 20                 # 정치적 편향 유도
    unreasonable: 15              # 무리한·악의적 요청
  # 응답 모드 전환 임계값 (누적 점수 기준)
  thresholds:
    cold: 30                      # 이상: 냉담한 응답
    hostile: 60                   # 이상: 매우 부정적 응답
    refuse: 90                    # 이상: 응답 거부
