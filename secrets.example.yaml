# config/secrets.example.yaml — secrets.yaml 작성용 템플릿
# 이 파일을 secrets.yaml로 복사하여 실제 값을 입력하세요.
# cp config/secrets.example.yaml config/secrets.yaml

# ─── Discord ──────────────────────────────────────────────────
discord:
  token: "your-discord-bot-token-here"

# ─── 봇 기본 정보 ─────────────────────────────────────────────
bot:
  name: "기리봇"

# ─── LLM 프로바이더별 설정 ────────────────────────────────────
llm:
  provider: "ollama"

  ollama:
    model: "llama3"
    host: "http://localhost:11434"

  openai:
    model: "gpt-4o-mini"
    api_key: "your-openai-api-key-here"
    base_url: null
