# config/secrets.example.yaml — secrets.yaml 작성용 템플릿
# 이 파일을 secrets.yaml로 복사하여 실제 값을 입력하세요.
# cp config/secrets.example.yaml config/secrets.yaml

# ─── Discord ──────────────────────────────────────────────────
discord:
  token: "your-discord-bot-token-here"

# ─── 봇 기본 정보 ─────────────────────────────────────────────
bot:
  name: "기리봇"
  log_level: "INFO"   # DEBUG / INFO / WARNING / ERROR

# ─── 메모리 설정 오버라이드 ───────────────────────────────────
memory:
  max_history: 3       # 최근 대화 포함 수
  max_messages: 10     # 채널 메시지 포함 수
  max_facts: 5         # 유저 팩트 포함 수
  max_summaries: 2     # 요약 포함 수
  max_events: 3        # 중요 이벤트 포함 수


# ─── LLM 프로바이더별 설정 ────────────────────────────────────
llm:
  provider: "ollama"

  ollama:
    model: "llama3"
    host: "http://localhost:11434"

  openai:
    model: "gpt-4o-mini"
    api_key: "your-openai-api-key-here"
    base_url: null

# ─── 스킬별 설정 오버라이드 (선택) ────────────────────────────
# 접속 정보는 data/credentials/<스킬명>.yaml 에 파일별로 관리합니다.
# 여기서는 credentials 위에 추가 오버라이드가 필요한 경우에만 사용합니다.
